<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sistema de Ventas - Login</title>

  <!-- Google Font: Source Sans 3 -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+3:300,400,400i,700&display=fallback">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- AdminLTE -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
</head>
<body class="hold-transition login-page">
<div class="login-box">
  <!-- /.login-logo -->
  <div class="card card-outline card-primary">
    <div class="card-header text-center">
      <a href="#" class="h1"><b>Sistema</b> Ventas</a>
    </div>
    <div class="card-body">
      <p class="login-box-msg">Inicia sesión para continuar</p>

      <form id="loginForm" action="#" method="post">
        <div class="input-group mb-3">
          <input type="text" id="username" class="form-control" placeholder="Usuario o Email" required autocomplete="username">
          <div class="input-group-append">
            <div class="input-group-text">
              <span class="fas fa-user"></span>
            </div>
          </div>
        </div>
        <div class="input-group mb-3">
          <input type="password" id="password" class="form-control" placeholder="Contraseña" required autocomplete="current-password">
          <div class="input-group-append">
            <div class="input-group-text">
              <span class="fas fa-lock"></span>
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-8">
            <div class="icheck-primary">
              <input type="checkbox" id="remember">
              <label for="remember">
                Recordarme
              </label>
            </div>
          </div>
          <!-- /.col -->
          <div class="col-4">
            <button type="submit" class="btn btn-primary btn-block" id="btnLogin">
              <span class="spinner-border spinner-border-sm d-none" id="spinner" role="status" aria-hidden="true"></span>
              <span id="btnText">Ingresar</span>
            </button>
          </div>
          <!-- /.col -->
        </div>
      </form>

      <div class="alert alert-danger d-none mt-3" id="errorAlert" role="alert">
        <i class="icon fas fa-ban"></i>
        <span id="errorMessage"></span>
      </div>
    </div>
    <!-- /.card-body -->
  </div>
  <!-- /.card -->
</div>
<!-- /.login-box -->

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<!-- Bootstrap 4 -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- AdminLTE App -->
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const loginForm = document.getElementById('loginForm');
  const errorAlert = document.getElementById('errorAlert');
  const errorMessage = document.getElementById('errorMessage');
  const btnLogin = document.getElementById('btnLogin');
  const btnText = document.getElementById('btnText');
  const spinner = document.getElementById('spinner');

  loginForm.addEventListener('submit', async function(e) {
    e.preventDefault();
    
    // Ocultar error anterior
    errorAlert.classList.add('d-none');
    
    // Mostrar spinner
    btnLogin.disabled = true;
    spinner.classList.remove('d-none');
    btnText.textContent = 'Ingresando...';

    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const remember = document.getElementById('remember').checked;

    try {
      const response = await fetch('api/login.php', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          username: username,
          password: password,
          remember: remember
        })
      });

      const data = await response.json();

      if (data.success) {
        // Login exitoso
        sessionStorage.setItem('userName', data.user.nombre || data.user.username);
        window.location.href = 'dashboard.html';
      } else {
        // Mostrar error
        errorMessage.textContent = data.message || 'Credenciales incorrectas';
        errorAlert.classList.remove('d-none');
        btnLogin.disabled = false;
        spinner.classList.add('d-none');
        btnText.textContent = 'Ingresar';
      }
    } catch (error) {
      console.error('Error:', error);
      errorMessage.textContent = 'Error de conexión. Por favor, intenta nuevamente.';
      errorAlert.classList.remove('d-none');
      btnLogin.disabled = false;
      spinner.classList.add('d-none');
      btnText.textContent = 'Ingresar';
    }
  });
});
</script>
</body>
</html>
