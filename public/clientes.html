                    <div class="col-md-6">

                      </div>
                    </div>
                  </div>

                    <div class="col-md-6">
                      <div class="form-group">
                        <label for="direccion">Dirección <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="direccion" name="direccion" required>
                      </div>
                    </div>
                    <div class="col-md-6">
                      <div class="form-group">
                        <label for="zona">Zona <span class="text-danger">*</span></label>
                        <select class="form-control select2" id="zona" name="zona" style="width: 100%;" data-placeholder="Buscar o escribir zona..." required>
                          <option value=""></option>
                        </select>
                      </div>
                    </div>
                  </div>

                  <!-- GPS -->

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<!-- Bootstrap 4 -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- Select2 -->
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<!-- AdminLTE App -->
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<script src="js/menu-fix.js"></script>
<!-- Leaflet JS para el mapa -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map = null;
let marker = null;

document.addEventListener('DOMContentLoaded', function() {
  // Inicializar Select2 para zona
  $('#zona').select2({
    theme: 'bootstrap4',
    placeholder: 'Buscar o escribir zona...',
    allowClear: true,
    tags: true, // Permite agregar nuevas opciones
    minimumInputLength: 0,
    ajax: {
      url: 'api/get_zonas.php',
      dataType: 'json',
      delay: 250,
      data: function (params) {
        return {
          q: params.term, // término de búsqueda
          page: params.page || 1
        };
      },
      processResults: function (data) {
        return {
          results: data.results || []
        };
      },
      cache: true
    }
  });

  // Cargar vendedores
  loadVendedores();

  // Botón obtener GPS automático
  document.getElementById('btnObtenerGPS').addEventListener('click', obtenerGPS);

  // Botón seleccionar en mapa
  document.getElementById('btnSeleccionarMapa').addEventListener('click', mostrarMapa);

  // Enviar formulario
  document.getElementById('formCliente').addEventListener('submit', guardarCliente);
});

function obtenerGPS() {
  const btn = document.getElementById('btnObtenerGPS');
  const status = document.getElementById('gpsStatus');
  
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Obteniendo ubicación...';
  status.className = 'gps-status';
  status.style.display = 'none';

  if (!navigator.geolocation) {
    mostrarErrorGPS('Tu navegador no soporta geolocalización');
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-map-marker-alt"></i> Obtener GPS Automático';
    return;
  }

  navigator.geolocation.getCurrentPosition(
    function(position) {
      const lat = position.coords.latitude;
      const lng = position.coords.longitude;
      
      document.getElementById('latitud').value = lat;
      document.getElementById('longitud').value = lng;
      
      status.className = 'gps-status gps-success';
      status.innerHTML = `<i class="fas fa-check-circle"></i> Ubicación obtenida: ${lat.toFixed(6)}, ${lng.toFixed(6)}`;
      status.style.display = 'block';
      
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-map-marker-alt"></i> Obtener GPS Automático';
    },
    function(error) {
      let mensaje = 'Error al obtener la ubicación';
      switch(error.code) {
        case error.PERMISSION_DENIED:
          mensaje = 'Permiso de ubicación denegado';
          break;
        case error.POSITION_UNAVAILABLE:
          mensaje = 'Información de ubicación no disponible';
          break;
        case error.TIMEOUT:
          mensaje = 'Tiempo de espera agotado';
          break;
      }
      mostrarErrorGPS(mensaje);
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-map-marker-alt"></i> Obtener GPS Automático';
    },
    { timeout: 10000, enableHighAccuracy: true }
  );
}

function mostrarErrorGPS(mensaje) {
  const status = document.getElementById('gpsStatus');
  status.className = 'gps-status gps-error';
  status.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${mensaje}`;
  status.style.display = 'block';
}

function mostrarMapa() {
  const mapDiv = document.getElementById('map');
  const btn = document.getElementById('btnSeleccionarMapa');
  
  if (mapDiv.style.display === 'none') {
    mapDiv.style.display = 'block';
    
    if (!map) {
      // Inicializar mapa (centrado en Bolivia por defecto)
      map = L.map('map').setView([-16.5000, -68.1500], 13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
      }).addTo(map);

      // Si ya hay coordenadas, centrar el mapa ahí
      const lat = document.getElementById('latitud').value;
      const lng = document.getElementById('longitud').value;
      if (lat && lng) {
        map.setView([lat, lng], 13);
        if (marker) {
          map.removeLayer(marker);
        }
        marker = L.marker([lat, lng]).addTo(map);
      }

      // Agregar marcador al hacer clic
      map.on('click', function(e) {
        const lat = e.latlng.lat;
        const lng = e.latlng.lng;
        
        document.getElementById('latitud').value = lat;
        document.getElementById('longitud').value = lng;
        
        if (marker) {
          map.removeLayer(marker);
        }
        marker = L.marker([lat, lng]).addTo(map);
        
        const status = document.getElementById('gpsStatus');
        status.className = 'gps-status gps-success';
        status.innerHTML = `<i class="fas fa-check-circle"></i> Ubicación seleccionada: ${lat.toFixed(6)}, ${lng.toFixed(6)}`;
        status.style.display = 'block';
      });
    }
    
    btn.innerHTML = '<i class="fas fa-eye-slash"></i> Ocultar Mapa';
  } else {
    mapDiv.style.display = 'none';
    btn.innerHTML = '<i class="fas fa-map"></i> Seleccionar en Mapa';
  }
}

async function loadVendedores() {
  try {
    // Por ahora, cargar desde usuarios (en producción, crear tabla de vendedores)
    const response = await fetch('api/get_vendedores.php');
    const data = await response.json();
    
    const select = document.getElementById('vendedor_asignado');
    if (data.success && data.vendedores) {
      data.vendedores.forEach(vendedor => {
        const option = document.createElement('option');
        option.value = vendedor.id;
        option.textContent = vendedor.nombre || vendedor.username;
        select.appendChild(option);
      });
    }
  } catch (error) {
    console.error('Error al cargar vendedores:', error);
  }
}

async function guardarCliente(e) {
  e.preventDefault();
  
  const form = e.target;
  
  // Validar campos requeridos antes de enviar
  const telefonoPrincipal = document.getElementById('telefono_principal').value.trim();
  const direccion = document.getElementById('direccion').value.trim();
  const zona = document.getElementById('zona').value;
  const latitud = document.getElementById('latitud').value;
  const longitud = document.getElementById('longitud').value;
  const vendedorAsignado = document.getElementById('vendedor_asignado').value;
  
  // Validaciones
  if (!telefonoPrincipal) {
    mostrarError('El teléfono principal es requerido');
    return;
  }
  if (!direccion) {
    mostrarError('La dirección es requerida');
    return;
  }
  if (!zona) {
    mostrarError('La zona es requerida');
    return;
  }
  if (!latitud || !longitud) {
    mostrarError('La ubicación GPS es requerida. Por favor, obtenga la ubicación automática o selecciónela en el mapa.');
    return;
  }
  if (!vendedorAsignado) {
    mostrarError('El vendedor asignado es requerido');
    return;
  }
  
  const formData = new FormData(form);
  const data = Object.fromEntries(formData);
  
  // Mostrar loading
  const submitBtn = form.querySelector('button[type="submit"]');
  const originalText = submitBtn.innerHTML;
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Guardando...';
  
  // Ocultar alertas
  document.getElementById('successAlert').classList.add('d-none');
  document.getElementById('errorAlert').classList.add('d-none');
  
  try {
    const response = await fetch('api/guardar_cliente.php', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(data)
    });
    
    const result = await response.json();
    
    if (result.success) {
      document.getElementById('successAlert').classList.remove('d-none');
      form.reset();
      document.getElementById('gpsStatus').style.display = 'none';
      document.getElementById('map').style.display = 'none';
      if (marker) {
        map.removeLayer(marker);
        marker = null;
      }
    } else {
      mostrarError(result.message || 'Error al guardar el cliente');
    }
  } catch (error) {
    console.error('Error:', error);
    mostrarError('Error de conexión. Por favor, intenta nuevamente.');
  } finally {
    submitBtn.disabled = false;
    submitBtn.innerHTML = originalText;
  }
}

function mostrarError(mensaje) {
  document.getElementById('errorMessage').textContent = mensaje;
  document.getElementById('errorAlert').classList.remove('d-none');
  // Scroll al error
  document.getElementById('errorAlert').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
</script>
